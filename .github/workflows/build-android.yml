name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        working-directory: sf-build
        run: npm install --legacy-peer-deps

      - name: Make gradlew executable
        working-directory: sf-build
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: sf-build
        run: cd android && ./gradlew assembleDebug --no-daemon
        env:
          EXPO_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.EXPO_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          EXPO_PUBLIC_SENTRY_DSN: ${{ secrets.EXPO_PUBLIC_SENTRY_DSN }}
          EXPO_PUBLIC_TWELVE_DATA_KEY: ${{ secrets.EXPO_PUBLIC_TWELVE_DATA_KEY }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: stacked-future-debug
          path: sf-build/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
